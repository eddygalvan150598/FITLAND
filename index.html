<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fit Land | Suplementos Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0b0b0b;
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(0,0,0,0.9);
    position: sticky;
    top: 0;
}

.logo img {
    height: 60px;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1579758629938-03607ccdbaba') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

.hero h2 {
    font-family: 'Bebas Neue';
    font-size: 70px;
    margin: 0;
}

.hero p {
    margin-top: 10px;
    color: #ccc;
}

.hero button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 16px;
    background: #ff1a1a;
    color: white;
    border: none;
    cursor: pointer;
}

/* PRODUCTOS */
.section {
    padding: 60px 20px;
    text-align: center;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
}

.card {
    background: #1a1a1a;
    border-radius: 15px;
    overflow: hidden;
    width: 250px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
}

.price {
    color: #ff1a1a;
    font-weight: bold;
}

button {
    background: #ff1a1a;
    border: none;
    padding: 12px;
    cursor: pointer;
    width: 100%;
    color: white;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
}

/* FOOTER */
footer {
    background: black;
    padding: 20px;
    text-align: center;
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">
<img src="logo-premium.png" alt="Fit Land Logo">
</div>
</nav>

<!-- HERO -->
<div class="hero">
<h2>SUPLEMENTOS PREMIUM</h2>
<p>BE STRONGER. BE FIT.</p>
<button onclick="whatsapp()">Comprar ahora</button>
</div>

<!-- PRODUCTOS -->
<div class="section">
<h2>Top ventas</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1599058917765-a780eda07a3e">
<h3>Proteína Whey</h3>
<p class="price">$899</p>
<button onclick="comprar('Proteína Whey')">Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584467735871-8dbd6c3e6f4c">
<h3>Creatina</h3>
<p class="price">$499</p>
<button onclick="comprar('Creatina')">Comprar</button>
</div>

</div>
</div>

<a class="whatsapp" href="#" onclick="whatsapp()">💬</a>

<footer>
© 2026 Fit Land
</footer>

<script>
function comprar(producto){
    let numero = "521XXXXXXXXXX";
    let mensaje = "Hola, quiero comprar " + producto;
    window.open("https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje));
}

function whatsapp(){
    let numero = "521XXXXXXXXXX";
    let mensaje = "Hola, quiero información";
    window.open("https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje));
}
</script>

</body>
</html>
